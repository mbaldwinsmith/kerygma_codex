<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#FAF7F2"/>

  <!-- Concentric circles — mandorla suggestion -->
  <circle cx="400" cy="250" r="200" fill="none" stroke="#C28840" stroke-width="1" opacity="0.07"/>
  <circle cx="400" cy="250" r="150" fill="none" stroke="#C28840" stroke-width="1" opacity="0.09"/>
  <circle cx="400" cy="250" r="100" fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.12"/>
  <circle cx="400" cy="250" r="55"  fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.16"/>

  <!-- Vesica piscis (two offset circles) -->
  <circle cx="365" cy="250" r="80" fill="none" stroke="#C28840" stroke-width="1" opacity="0.20"/>
  <circle cx="435" cy="250" r="80" fill="none" stroke="#C28840" stroke-width="1" opacity="0.20"/>

  <!-- Cross motif -->
  <rect x="385" y="200" width="30"  height="100" fill="#C28840" opacity="0.10" rx="2"/>
  <rect x="355" y="235" width="90"  height="30"  fill="#C28840" opacity="0.10" rx="2"/>

  <!-- Label -->
  <text x="400" y="474" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6B7180" opacity="0.55">home-hero.svg — placeholder</text>
</svg>
