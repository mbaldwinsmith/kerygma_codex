<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background -->
  <rect width="600" height="400" fill="#FAF7F2"/>

  <!-- Golden spiral (Archimedean approximation — concentric quarter-arcs) -->
  <path d="M 300 200 Q 300 120 380 120 Q 460 120 460 200 Q 460 300 340 300 Q 220 300 220 180 Q 220 90 320 90"
        fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.18"/>
  <path d="M 300 200 Q 300 150 340 150 Q 380 150 380 200 Q 380 255 310 255 Q 250 255 250 190"
        fill="none" stroke="#C28840" stroke-width="1"   opacity="0.22"/>

  <!-- Season marks — four directions -->
  <circle cx="300" cy="120" r="5" fill="#C28840" opacity="0.20"/>
  <circle cx="390" cy="200" r="5" fill="#C28840" opacity="0.20"/>
  <circle cx="300" cy="280" r="5" fill="#C28840" opacity="0.20"/>
  <circle cx="210" cy="200" r="5" fill="#C28840" opacity="0.20"/>

  <!-- Cross motif -->
  <rect x="291" y="165" width="18" height="70"  fill="#C28840" opacity="0.10" rx="2"/>
  <rect x="271" y="193" width="58" height="18"  fill="#C28840" opacity="0.10" rx="2"/>

  <!-- Label -->
  <text x="300" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B7180" opacity="0.55">sections/rule-of-life.svg — placeholder</text>
</svg>
