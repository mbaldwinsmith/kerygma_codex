<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background -->
  <rect width="600" height="400" fill="#FAF7F2"/>

  <!-- Overlapping circles — shared commons -->
  <circle cx="240" cy="185" r="90" fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.16"/>
  <circle cx="360" cy="185" r="90" fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.16"/>
  <circle cx="300" cy="270" r="90" fill="none" stroke="#7A9E9F" stroke-width="1"   opacity="0.18"/>

  <!-- Filled vesica at intersections -->
  <circle cx="300" cy="185" r="25"  fill="#C28840" opacity="0.07"/>
  <circle cx="240" cy="270" r="18"  fill="#C28840" opacity="0.07"/>
  <circle cx="360" cy="270" r="18"  fill="#C28840" opacity="0.07"/>

  <!-- Cross motif -->
  <rect x="291" y="160" width="18" height="50"  fill="#C28840" opacity="0.12" rx="2"/>
  <rect x="276" y="177" width="48" height="18"  fill="#C28840" opacity="0.12" rx="2"/>

  <!-- Label -->
  <text x="300" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B7180" opacity="0.55">sections/about.svg — placeholder</text>
</svg>
