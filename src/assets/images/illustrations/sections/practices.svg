<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background -->
  <rect width="600" height="400" fill="#FAF7F2"/>

  <!-- Seven concentric circles — practices as layered participation -->
  <circle cx="300" cy="195" r="160" fill="none" stroke="#C28840" stroke-width="1"   opacity="0.07"/>
  <circle cx="300" cy="195" r="130" fill="none" stroke="#C28840" stroke-width="1"   opacity="0.09"/>
  <circle cx="300" cy="195" r="100" fill="none" stroke="#C28840" stroke-width="1"   opacity="0.11"/>
  <circle cx="300" cy="195" r="72"  fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.14"/>
  <circle cx="300" cy="195" r="46"  fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.17"/>
  <circle cx="300" cy="195" r="24"  fill="none" stroke="#C28840" stroke-width="2"   opacity="0.20"/>

  <!-- Cross motif -->
  <rect x="288" y="155" width="24" height="80"  fill="#C28840" opacity="0.10" rx="2"/>
  <rect x="268" y="183" width="64" height="24"  fill="#C28840" opacity="0.10" rx="2"/>

  <!-- Sage accent ring -->
  <circle cx="300" cy="195" r="113" fill="none" stroke="#7A9E9F" stroke-width="1" opacity="0.12" stroke-dasharray="4 6"/>

  <!-- Label -->
  <text x="300" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B7180" opacity="0.55">sections/practices.svg — placeholder</text>
</svg>
