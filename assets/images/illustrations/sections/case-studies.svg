<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background -->
  <rect width="600" height="400" fill="#FAF7F2"/>

  <!-- Arcs — individual pastoral journeys converging -->
  <path d="M 100 320 Q 200 120 300 200" fill="none" stroke="#C28840"  stroke-width="1.5" opacity="0.16"/>
  <path d="M 140 320 Q 250 100 300 200" fill="none" stroke="#C4A99A"  stroke-width="1"   opacity="0.22"/>
  <path d="M 500 320 Q 400 120 300 200" fill="none" stroke="#C28840"  stroke-width="1.5" opacity="0.16"/>
  <path d="M 460 320 Q 350 100 300 200" fill="none" stroke="#C4A99A"  stroke-width="1"   opacity="0.22"/>
  <path d="M 300 320 Q 300 120 300 200" fill="none" stroke="#7A9E9F"  stroke-width="1"   opacity="0.20"/>

  <!-- Gathering point circle -->
  <circle cx="300" cy="200" r="30"  fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.22"/>
  <circle cx="300" cy="200" r="16"  fill="#C28840" opacity="0.08"/>

  <!-- Cross motif -->
  <rect x="293" y="180" width="14" height="40"  fill="#C28840" opacity="0.14" rx="1"/>
  <rect x="283" y="196" width="34" height="14"  fill="#C28840" opacity="0.14" rx="1"/>

  <!-- Label -->
  <text x="300" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B7180" opacity="0.55">sections/case-studies.svg — placeholder</text>
</svg>
