<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background -->
  <rect width="600" height="400" fill="#FAF7F2"/>

  <!-- Byzantine grid — vertical pillars -->
  <line x1="220" y1="80"  x2="220" y2="310" stroke="#C28840" stroke-width="1.5" opacity="0.14"/>
  <line x1="300" y1="60"  x2="300" y2="310" stroke="#C28840" stroke-width="1.5" opacity="0.18"/>
  <line x1="380" y1="80"  x2="380" y2="310" stroke="#C28840" stroke-width="1.5" opacity="0.14"/>

  <!-- Horizontal beams — three courses -->
  <line x1="160" y1="140" x2="440" y2="140" stroke="#C28840" stroke-width="1"   opacity="0.11"/>
  <line x1="160" y1="195" x2="440" y2="195" stroke="#C28840" stroke-width="1.5" opacity="0.14"/>
  <line x1="160" y1="255" x2="440" y2="255" stroke="#C28840" stroke-width="1"   opacity="0.11"/>

  <!-- Cross motif (centre) -->
  <rect x="288" y="155" width="24" height="80" fill="#C28840" opacity="0.10" rx="2"/>
  <rect x="268" y="183" width="64" height="24" fill="#C28840" opacity="0.10" rx="2"/>

  <!-- Arch suggestion at top -->
  <path d="M 220 140 Q 300 80 380 140" fill="none" stroke="#C28840" stroke-width="1.5" opacity="0.16"/>

  <!-- Label -->
  <text x="300" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B7180" opacity="0.55">sections/foundation.svg — placeholder</text>
</svg>
